name: Anchors Demo

on:
  push:
    branches: [ master ]

jobs:
  use-vars-and-secrets:
    runs-on: ubuntu-latest
    env:
      DEPLOY_TOKEN: ${{ secrets.DEPLOY_TOKEN }}
    steps:
      - name: Read repo variables (visible in logs)
        run: |
          echo "Region: ${{ vars.DEPLOY_REGION }}"
          echo "Tier:   ${{ vars.DEPLOY_TIER }}"

      - name: Use the secret (token value will be masked)
        run: |
          echo "Token length: ${#DEPLOY_TOKEN}"
          echo "Echoing the token directly: $DEPLOY_TOKEN"
          echo "Note: GitHub auto-masks any line that contains the secret value."
