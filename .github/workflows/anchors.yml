name: Anchors Demo

on:
  push:
    branches: [ master ]

env:
  LOG_LEVEL: info
  CACHE_TTL: '3600'
  REGION: us-east-1

jobs:
  dev:
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: debug
      DEBUG_MODE: 'true'
    steps:
      - run: |
          echo "LOG_LEVEL:  $LOG_LEVEL"
          echo "CACHE_TTL:  $CACHE_TTL"
          echo "REGION:     $REGION"
          echo "DEBUG_MODE: $DEBUG_MODE"

  prod:
    runs-on: ubuntu-latest
    env:
      LOG_LEVEL: warn
      AUDIT_ENABLED: 'true'
    steps:
      - run: |
          echo "LOG_LEVEL:     $LOG_LEVEL"
          echo "CACHE_TTL:     $CACHE_TTL"
          echo "REGION:        $REGION"
          echo "AUDIT_ENABLED: $AUDIT_ENABLED"
