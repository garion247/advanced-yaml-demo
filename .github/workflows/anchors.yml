name: Anchors Demo

on:
  push:
    branches: [ master ]

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - &setup-node
        name: Setup Node 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test

  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - *setup-node
      - run: npm run build
