name: Anchors Demo

on:
  push:
    branches: [ master, 'release/**' ]
  workflow_dispatch:
    inputs:
      environment:
        description: 'Override environment'
        required: false
        type: choice
        default: ''
        options: [ '', development, staging, production ]

env:
  TARGET_ENV: >-
    ${{
      (github.event_name == 'workflow_dispatch' && inputs.environment != '' && inputs.environment) ||
      (github.ref == 'refs/heads/master' && 'production') ||
      (startsWith(github.ref, 'refs/heads/release/') && 'staging') ||
      'development'
    }}
  CONFIG: |
    {
      "development": { "replicas": 1, "tier": "Basic",    "monitor": false },
      "staging":     { "replicas": 2, "tier": "Standard", "monitor": true  },
      "production":  { "replicas": 5, "tier": "Premium",  "monitor": true  }
    }

jobs:
  configure:
    runs-on: ubuntu-latest
    steps:
      - name: Resolve config for ${{ env.TARGET_ENV }}
        run: |
          echo "Target env: ${{ env.TARGET_ENV }}"
          echo "Replicas:   ${{ fromJSON(env.CONFIG)[env.TARGET_ENV].replicas }}"
          echo "Tier:       ${{ fromJSON(env.CONFIG)[env.TARGET_ENV].tier }}"
          echo "Monitor:    ${{ fromJSON(env.CONFIG)[env.TARGET_ENV].monitor }}"
